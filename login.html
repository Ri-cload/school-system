<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Joseph School Management System</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #4caf50;
            --accent-color: #8bc34a;
            --bg-color: #f1f8e9;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-color), #dcedc8);
            color: var(--text-color);
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin: 0 0 10px;
            color: var(--primary-color);
            font-size: 1.7rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: var(--secondary-color);
        }

        .extra-links {
            margin-top: 16px;
            text-align: center;
            font-size: 0.95rem;
        }

        .extra-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .role-note {
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 8px;
            background: #f3f8f3;
            color: #2e7d32;
            font-size: 0.95rem;
            text-align: center;
        }

        .status-message {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #2e7d32;
            text-align: center;
        }

        .toggle-link {
            margin-top: 12px;
            text-align: center;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
        }

        .signup-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>JOSEPH SCHOOL MANAGEMENT SYSTEM</h1>
        <p class="subtitle">Sign in to access the school dashboard</p>
        <div class="role-note">Use your email or full name to sign in. No password is required.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email or Name</label>
                <input type="text" id="username" placeholder="Enter email or name" required>
            </div>

            <button id="loginButton" type="submit">Log In</button>
            <p id="formMessage" class="status-message"></p>
        </form>

        <div class="signup-section">
            <p class="toggle-link" id="toggleSignup">Create an account</p>
            <form id="signupForm" style="display:none; margin-top: 12px;">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter new email" required>
                </div>
                <button type="submit">Create Account</button>
                <p id="signupMessage" class="status-message"></p>
            </form>
        </div>

        <a class="back-link" href="file.html">← Back to Dashboard</a>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const username = document.getElementById('username');
        const formMessage = document.getElementById('formMessage');
        const signupMessage = document.getElementById('signupMessage');
        const toggleSignup = document.getElementById('toggleSignup');
        const signupName = document.getElementById('signupName');
        const signupEmail = document.getElementById('signupEmail');

        const existingUsers = JSON.parse(localStorage.getItem('josephUsers') || '[]');

        toggleSignup.addEventListener('click', function () {
            signupForm.style.display = signupForm.style.display === 'none' ? 'block' : 'none';
        });

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const inputValue = username.value.trim();
            const email = inputValue.toLowerCase();
            const name = inputValue.trim();

            if (!inputValue) {
                formMessage.textContent = 'Please enter your email or name.';
                return;
            }

            if (email === 'admin@example.com') {
                localStorage.setItem('josephRole', 'admin');
                localStorage.setItem('josephLoggedIn', 'true');
                window.location.href = 'file.html';
                return;
            }

            const savedUsers = JSON.parse(localStorage.getItem('josephUsers') || '[]');
            const matchedUser = savedUsers.find(function (user) {
                return user.email === email || user.name === name;
            });

            if (matchedUser) {
                localStorage.setItem('josephRole', 'user');
                localStorage.setItem('josephLoggedIn', 'true');
                window.location.href = 'file.html';
                return;
            }

            formMessage.textContent = 'No account found for that email or name.';
        });

        signupForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const newName = signupName.value.trim();
            const newEmail = signupEmail.value.trim().toLowerCase();

            if (!newName || !newEmail) {
                signupMessage.textContent = 'Please enter both your name and email.';
                return;
            }

            const savedUsers = JSON.parse(localStorage.getItem('josephUsers') || '[]');
            const exists = savedUsers.some(function (user) {
                return user.email === newEmail || user.name === newName;
            });

            if (exists) {
                signupMessage.textContent = 'This email already has an account.';
                return;
            }

            savedUsers.push({ name: newName, email: newEmail });
            localStorage.setItem('josephUsers', JSON.stringify(savedUsers));
            signupMessage.textContent = 'Account created successfully. You can now log in.';
            signupName.value = '';
            signupEmail.value = '';
        });
    </script>
</body>
</html>
