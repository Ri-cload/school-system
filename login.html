<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Joseph School Management System</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #4caf50;
            --accent-color: #8bc34a;
            --bg-color: #f1f8e9;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-color), #dcedc8);
            color: var(--text-color);
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            margin: 0 0 10px;
            color: var(--primary-color);
            font-size: 1.7rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: var(--secondary-color);
        }

        .extra-links {
            margin-top: 16px;
            text-align: center;
            font-size: 0.95rem;
        }

        .extra-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .role-note {
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 8px;
            background: #f3f8f3;
            color: #2e7d32;
            font-size: 0.95rem;
            text-align: center;
        }

        .status-message {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #2e7d32;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>JOSEPH SCHOOL MANAGEMENT SYSTEM</h1>
        <p class="subtitle">Sign in to access the school dashboard</p>
        <div class="role-note">Use your email and phone number as the password.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Phone Number</label>
                <input type="text" id="password" placeholder="Enter phone number" required>
            </div>

            <button id="loginButton" type="submit">Log In</button>
            <p id="formMessage" class="status-message"></p>
        </form>

        <div class="extra-links">
            <a href="#">Forgot password?</a>
        </div>

        <a class="back-link" href="file.html">← Back to Dashboard</a>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const formMessage = document.getElementById('formMessage');

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const email = username.value.trim().toLowerCase();
            const phone = password.value.trim();

            if (email === 'admin@example.com' && phone === '0712345678') {
                localStorage.setItem('josephRole', 'admin');
                localStorage.setItem('josephLoggedIn', 'true');
                window.location.href = 'file.html';
                return;
            }

            if (email === 'user@example.com' && phone === '0723456789') {
                localStorage.setItem('josephRole', 'user');
                localStorage.setItem('josephLoggedIn', 'true');
                window.location.href = 'file.html';
                return;
            }

            formMessage.textContent = 'Invalid email or phone password.';
        });
    </script>
</body>
</html>
