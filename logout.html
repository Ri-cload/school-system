<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Joseph School Management System</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #4caf50;
            --bg-color: #f1f8e9;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-color), #dcedc8);
            color: var(--text-color);
            padding: 20px;
        }

        .logout-card {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        button, a.button {
            display: inline-block;
            padding: 12px 18px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover, a.button:hover {
            background: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <h1>You have been logged out</h1>
        <p>Thank you for using the Joseph School Management System.</p>
        <a class="button" href="login.html">Go to Login</a>
    </div>

    <script>
        localStorage.removeItem('josephLoggedIn');
        localStorage.removeItem('josephRole');
    </script>
</body>
</html>
